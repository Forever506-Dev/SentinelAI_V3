# ============================================================
# SentinelAI — Agent Build Pipeline
# ============================================================
# Cross-compiles the Rust agent for Windows, Linux x86_64,
# and Linux aarch64. Uploads binaries as release artifacts on tag.
# ============================================================

name: Agent Build

on:
  push:
    branches: [main, develop]
    paths:
      - "agent/**"
      - ".github/workflows/agent-build.yml"
    tags:
      - "agent-v*"
  pull_request:
    paths:
      - "agent/**"

jobs:
  lint:
    name: Clippy & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('agent/Cargo.lock') }}

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --check

  build:
    name: Build (${{ matrix.target }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: sentinel-agent.exe
            artifact: sentinel-agent-windows-x86_64.exe

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: sentinel-agent
            artifact: sentinel-agent-linux-x86_64

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: sentinel-agent
            artifact: sentinel-agent-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-"* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('agent/Cargo.lock') }}

      - name: Build release binary
        working-directory: agent
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp "agent/target/${{ matrix.target }}/release/${{ matrix.binary }}" \
             "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --all-targets

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/agent-v')
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sentinel-agent-windows-x86_64.exe/sentinel-agent-windows-x86_64.exe
            sentinel-agent-linux-x86_64/sentinel-agent-linux-x86_64
            sentinel-agent-linux-aarch64/sentinel-agent-linux-aarch64
          generate_release_notes: true
