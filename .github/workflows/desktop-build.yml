# ============================================================
# SentinelAI — Desktop App Build Pipeline
# ============================================================
# Builds the Tauri desktop application for Windows, Linux, macOS.
# The panel (Next.js) is built first as the frontend source.
# ============================================================

name: Desktop Build

on:
  push:
    branches: [main, develop]
    paths:
      - "desktop/**"
      - "panel/**"
      - ".github/workflows/desktop-build.yml"
    tags:
      - "desktop-v*"
  pull_request:
    paths:
      - "desktop/**"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}

      # ── Build the panel (frontend source for Tauri) ────────
      - name: Install panel dependencies
        working-directory: panel
        run: npm ci

      - name: Build panel
        working-directory: panel
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build

      # ── Build the Tauri desktop app ────────────────────────
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      # ── Upload artifacts ───────────────────────────────────
      - name: Upload Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: sentinelai-desktop-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Linux packages
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: sentinelai-desktop-linux
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload macOS installer
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: sentinelai-desktop-macos
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sentinelai-desktop-windows/**
            sentinelai-desktop-linux/**
            sentinelai-desktop-macos/**
          generate_release_notes: true
